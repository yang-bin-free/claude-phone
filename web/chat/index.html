<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Claude Phone</title>
  <link rel="stylesheet" href="../assets/core.css">
  <link rel="stylesheet" href="../assets/desktop.css">
  <link rel="stylesheet" href="../assets/mobile.css">
  <link rel="stylesheet" href="../assets/admin.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand"><span class="status-dot" id="status-dot"></span>Claude Phone</div>
      <button id="new-session" class="primary">新建会话</button>
      <nav id="session-list" aria-label="会话列表"></nav>
      <button id="show-admin" class="quiet">管理与诊断</button>
    </aside>
    <main class="workspace">
      <header>
        <button id="new-session-mobile" class="quiet">＋</button>
        <strong id="view-title">新会话</strong>
        <select id="mobile-session-select" aria-label="切换会话"><option value="">会话</option></select>
        <span id="connection-state">连接中</span>
        <div class="header-actions"><select id="create-project" aria-label="新会话项目"><option value="">默认目录</option></select><select id="create-permission" aria-label="权限模式"><option value="default">严格</option><option value="acceptEdits">审阅</option><option value="bypassPermissions">信任</option></select><button id="stop-session" class="quiet" disabled>停止</button><button id="open-settings" class="quiet">设置</button></div>
      </header>
      <section id="chat-view" class="chat-view">
        <div id="messages" class="messages"><p class="empty">从 Mac 或手机开始一段会话。</p></div>
        <div id="prompt-templates" aria-label="提示词模板"></div>
        <form id="composer"><textarea id="prompt" rows="3" placeholder="输入消息…"></textarea><button id="voice-mobile" type="button" class="quiet" aria-label="语音输入">🎙</button><button class="primary">发送</button></form>
      </section>
      <section id="admin-view" class="admin-view" hidden>
        <div class="metric-grid" id="metrics"></div>
        <h2>设备</h2>
        <form id="device-form"><input id="device-name" placeholder="设备名称，例如 Pixel"><button class="primary">生成 Device Token</button></form>
        <pre id="new-device-token" hidden></pre>
        <div id="admin-devices"></div>
        <h2>工作目录</h2>
        <form id="project-form"><input id="project-name" placeholder="名称"><input id="project-path" placeholder="绝对路径" required><button class="primary">添加</button></form>
        <div id="admin-projects"></div>
        <h2>权限规则</h2>
        <p>规则会通过 Claude CLI 官方的 allowedTools 机制应用到新建或恢复的会话。</p>
        <form id="permission-form"><input id="permission-tool" placeholder="工具，例如 Bash" required><input id="permission-pattern" placeholder="模式，例如 git status:*"><button class="primary">始终允许</button></form>
        <div id="admin-permissions"></div>
        <h2>活跃会话</h2><div id="admin-sessions"></div>
      </section>
    </main>
  </div>
  <script src="../assets/chat.js"></script>
  <script src="../assets/admin.js"></script>
</body>
</html>
